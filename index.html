<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCMS - Student Classroom Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .nav-button {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .secondary {
            background: #f8f9fa;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .status {
            margin-top: 30px;
            padding: 15px;
            background: #e8f5e8;
            border-radius: 8px;
            color: #2d5a2d;
            font-size: 0.9rem;
        }
        
        .loading {
            display: none;
            margin-top: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📚 SCMS</div>
        <div class="subtitle">Student Classroom Management System</div>
        
        <div class="nav-buttons">
            <a href="google_oauth_login.html" class="nav-button primary">
                🔐 Login / Register
            </a>
            <a href="cors_attendance_test.html" class="nav-button secondary">
                🧪 API Testing
            </a>
            <a href="test_login_endpoints.html" class="nav-button secondary">
                🔍 Login Testing
            </a>
        </div>
        
        <div class="status">
            ✅ Backend: Railway (Production)<br>
            ✅ Frontend: Vercel (Production)<br>
            ✅ CORS: Configured for cross-origin requests
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Testing backend connection...</div>
        </div>
    </div>

    <script>
        // Test backend connection on page load
        window.onload = function() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            fetch('https://scmsnew-production.up.railway.app/index.php/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: 'test@example.com',
                    password: 'test'
                })
            })
            .then(response => {
                if (response.headers.get('Access-Control-Allow-Origin')) {
                    loading.innerHTML = '<div style="color: #28a745;">✅ Backend connection successful!</div>';
                } else {
                    loading.innerHTML = '<div style="color: #dc3545;">❌ Backend connection failed</div>';
                }
            })
            .catch(error => {
                loading.innerHTML = '<div style="color: #ffc107;">⚠️ Backend connection test failed (expected for invalid credentials)</div>';
            });
        };
    </script>
</body>
</html>
